        <!-- Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&family=Rubik:wght@300..900&display=swap"
            rel="stylesheet"
        />

        <!-- Tailwind -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Vue -->
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

        <style>
            :root {
                --bg: #f2f4f5;
                --card: #fff;
                --accent: #3b4d61;
                --accent-dark: #bf4040;
                --muted: #7c8a92;
                --shadow: rgba(0, 0, 0, 0.07);
                --border: rgba(0, 0, 0, 0.08);
                --hover-bg: rgba(59, 77, 97, 0.08);
                --page-padding: 36px;
                --main-margin-top: 48px;
                --main-margin-bottom: 56px;
            }

            @media (max-width: 640px) {
                :root {
                    --page-padding: 18px;
                    --main-margin-top: 28px;
                    --main-margin-bottom: 36px;
                }
            }

            @media (max-width: 420px) {
                :root {
                    --page-padding: 14px;
                    --main-margin-top: 22px;
                    --main-margin-bottom: 30px;
                }
            }

            body.dark-theme {
                --bg: #0f1418;
                --card: #1b232a;
                --accent: #4d6b88;
                --accent-dark: #bb4040;
                --muted: #a0aeb9;
                --shadow: rgba(0, 0, 0, 0.5);
                --border: rgba(255, 255, 255, 0.12);
                --hover-bg: rgba(155, 179, 199, 0.12);
                color: #e9edf0;
            }

            * {
                box-sizing: border-box;
            }

            html {
                height: 100%;
            }

            body {
                margin: 0;
                font-family: "Rubik", sans-serif;
                color: #222;
                background: var(--bg);
                background-image: radial-gradient(
                    800px 600px at 20% 20%,
                    rgba(59, 77, 97, 0.05),
                    transparent
                );
                display: block;
                min-height: 100dvh;
                padding: var(--page-padding);
                transition:
                    background 0.3s,
                    color 0.3s;
                -webkit-text-size-adjust: 100%;
            }

            @media (max-width: 340px) {
                body {
                    font-size: 15px;
                }
            }

            main {
                margin: var(--main-margin-top) auto var(--main-margin-bottom);
            }
        </style>
    </head>
    <body>
        <main
            id="app"
            class="w-full max-w-[600px] bg-[var(--card)] rounded-[18px] shadow-[0_10px_30px_var(--shadow)] p-9 max-[520px]:p-6 border border-[var(--border)] transition-all duration-300"
            role="main"
        >
            <header class="text-center mb-6 relative">
                <div
                    class="w-[100px] h-[100px] max-[520px]:w-20 max-[520px]:h-20 rounded-full shadow-[0_4px_14px_rgba(0,0,0,0.2)] mx-auto mb-4 bg-center bg-cover"
                    style="
                        background-image: url(&quot;https://avatars.githubusercontent.com/u/125800147&quot;);
                    "
                ></div>
                <button
                    class="absolute top-0 right-0 border border-[var(--border)] text-[var(--accent)] rounded-lg py-[6px] px-2 cursor-pointer text-[13px] transition-colors bg-transparent hover:bg-[var(--accent-dark)]"
                    @click="toggleTheme"
                    :aria-label="isDark ? 'Светлая тема' : 'Тёмная тема'"
                >
                    {{ isDark ? '☀️' : '🌙' }}
                </button>
                <h1
                    class="m-0 font-['Lexend'] text-[26px] max-[520px]:text-[22px] text-[var(--accent-dark)]"
                >
                    {{ title }}
                </h1>
                <p class="m-0 mt-1 text-[15px] text-[var(--muted)]">
                    {{ alias }}
                </p>
            </header>

            <section
                class="grid gap-2.5 mt-5 justify-center"
                aria-label="Социальные ссылки"
            >
                <a
                    v-for="(l,i) in links"
                    :key="i"
                    :href="l.url"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="group inline-flex items-center gap-[10px] py-[10px] px-4 rounded-[10px] border border-[var(--border)] no-underline text-current transition-all duration-200 hover:-translate-y-[3px] hover:shadow-[0_8px_18px_rgba(0,0,0,0.06)] hover:bg-[var(--hover-bg)] hover:border-[var(--accent)]"
                >
                    <div
                        class="w-[34px] h-[34px] rounded-[8px] bg-[var(--accent)] flex items-center justify-center text-white text-[20px] shrink-0 transition-colors group-hover:bg-[var(--accent-dark)]"
                    >
                        <i :class="l.icon"></i>
                    </div>
                    <div class="flex flex-col">
                        <div class="font-medium text-[14px]">{{ l.title }}</div>
                        <div class="text-[12px] text-[var(--muted)]">
                            {{ l.subtitle }}
                        </div>
                    </div>
                </a>
            </section>

            <footer
                class="mt-7 flex justify-between items-center gap-3 flex-wrap"
            >
                <a
                    class="text-[13px] text-[var(--muted)] hover:text-[var(--accent-dark)] transition-colors"
                    target="_blank"
                    href="https://github.com/alyreniko/alyreniko.github.io"
                    >⚠️ Website under development</a
                >
                <div class="text-[var(--muted)]">Made with ✨</div>
            </footer>
        </main>

        <script>
            const { createApp, ref, watch, onMounted, computed } = Vue;

            createApp({
                setup() {
                    const prefersDark = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;
                    const theme = ref(
                        localStorage.getItem("theme") ||
                            (prefersDark ? "dark" : "light"),
                    );

                    const isDark = computed(() => theme.value === "dark");

                    const applyTheme = (t) => {
                        document.body.classList.toggle(
                            "dark-theme",
                            t === "dark",
                        );
                    };

                    const toggleTheme = () => {
                        theme.value = isDark.value ? "light" : "dark";
                    };

                    watch(theme, (val) => {
                        applyTheme(val);
                        localStorage.setItem("theme", val);
                    });

                    onMounted(() => applyTheme(theme.value));

                    const title = "ALYRENIKO";
                    const alias = "Diyor Haydarov";
                    const links = ref([
                        {
                            title: "GitHub",
                            subtitle: "@alyreniko",
                            icon: "fa-brands fa-github",
                            url: "https://github.com/alyreniko",
                        },
                        {
                            title: "Telegram",
                            subtitle: "@alyreniko",
                            icon: "fa-brands fa-telegram",
                            url: "https://t.me/alyreniko",
                        },
                        {
                            title: "Behance",
                            subtitle: "@alyreniko",
                            icon: "fa-brands fa-behance fa-sm",
                            url: "https://www.behance.net/alyreniko",
                        },
                        {
                            title: "LinkedIn",
                            subtitle: "@alyreniko",
                            icon: "fa-brands fa-linkedin-in",
                            url: "https://www.linkedin.com/in/alyreniko/",
                        },
                        {
                            title: "Mail",
                            subtitle: "alyreniko@gmail.com",
                            icon: "fa-solid fa-envelope fa-sm",
                            url: "mailto:alyreniko@gmail.com",
                        },
                    ]);

                    return { theme, isDark, toggleTheme, title, alias, links };
                },
            }).mount("#app");
        </script>
    </body>
</html>
