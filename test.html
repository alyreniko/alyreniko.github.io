<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <style>
        body {
            display: flex;
            margin: 0;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: hsl(0, 0%, 0%);
        }
        .middle {
            display: flex;
            width: 400px;
            height: 700px;
            align-items: center;
            justify-content: center;
            background-color: hsl(0, 0%, 5%);
            border: 1px solid hsl(0, 0%, 20%);
            border-radius: 30px;
        }
        .top {
            width: 100px;
            width: hsl(0, 0%, 10%);
            height: 30px;
            background-color: hsl(0, 0%, 10%);
            border-radius: 10px;
            border: 1px solid hsl(0, 0%, 25%);
        }
    </style>
    <body>
        <div class="middle">
            <div class="top"></div>
        </div>
    </body>
</html>
